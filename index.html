<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>To do List</title>
</head>
<body>
    <nav class="bg-modes">
        <button class="dark"><img src="icons/dark-mode-switch.svg" height="10" width="10" alt="dark mode"></button>
        <button class="light"><img src="icons/light-switch.svg" height="10" width="10" alt="light mode"></button>
    </nav>
    <div class="weekdays">
        <div class="weekday" id="monday">
            <button><h2>Monday</h2></button>
            <button class="add-task"><img src="icons/add-icon-darkmode.svg" alt="add task" height="100" width="100"></button>
        </div>
        <div class="weekday" id="tuesday">
            <button><h2>Tuesday</h2></button>
            <button class="add-task"><img src="icons/add-icon-darkmode.svg" alt="add task" height="100" width="100"></button>
        </div>
        <div class="weekday" id="wednesday">
            <button><h2>Wednesday</h2></button>
            <button class="add-task"><img src="icons/add-icon-darkmode.svg" alt="add task" height="100" width="100"></button>
        </div>
        <div class="weekday" id="thursday">
            <button><h2>Thursday</h2></button>
            <button class="add-task"><img src="icons/add-icon-darkmode.svg" alt="add task" height="100" width="100"></button>
        </div>
        <div class="weekday" id="friday">
            <button><h2>Friday</h2></button>
            <button class="add-task"><img src="icons/add-icon-darkmode.svg" alt="add task" height="100" width="100"></button>
        </div>
        <div class="weekday" id="saturday">
            <button><h2>Saturday</h2></button>
            <button class="add-task"><img src="icons/add-icon-darkmode.svg" alt="add task" height="100" width="100"></button>
        </div>
        <div class="weekday" id="sunday">
            <button><h2>Sunday</h2></button>
            <button class="add-task"><img src="icons/add-icon-darkmode.svg" alt="add task" height="100" width="100"></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
